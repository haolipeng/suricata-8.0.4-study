services:
  suricata-lab:
    build:
      context: ../../
      dockerfile: docs/docker/Dockerfile
    container_name: suricata-lab
    image: suricata-lab:8.0.3
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    network_mode: host
    volumes:
      # 挂载源码目录，方便在容器内外同步修改
      - ../../:/opt/suricata-src:ro
      # 持久化日志
      - suricata-logs:/var/log/suricata
      # 持久化自定义规则
      - suricata-rules:/var/lib/suricata/rules
      # 挂载 pcap 文件目录（放入你的测试 pcap）
      - ./pcaps:/opt/pcaps
    stdin_open: true
    tty: true

  # ELK 集成环境（板块二 EVE JSON 章节使用）
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: suricata-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    profiles:
      - elk

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: suricata-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    profiles:
      - elk

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: suricata-logstash
    volumes:
      - suricata-logs:/var/log/suricata:ro
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    depends_on:
      - elasticsearch
    profiles:
      - elk

volumes:
  suricata-logs:
  suricata-rules:
  es-data:
